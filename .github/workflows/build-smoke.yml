name: Build Smoke

on:
  push:
    branches:
      - fix/0.10.0-review-pass
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-build:
    name: Desktop Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
          - os: ubuntu-22.04
          - os: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Set Tauri signing key
        shell: bash
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${RAW_TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "❌ TAURI_SIGNING_PRIVATE_KEY Secret 为空" >&2
            exit 1
          fi
          CLEAN_KEY=$(printf '%s' "$RAW_TAURI_SIGNING_PRIVATE_KEY" | tr -d ' \r\n')
          if ! echo -n "$CLEAN_KEY" | base64 --decode >/dev/null 2>&1; then
            echo "❌ TAURI_SIGNING_PRIVATE_KEY 不是有效的 base64" >&2
            exit 1
          fi
          {
            printf 'TAURI_SIGNING_PRIVATE_KEY=%s\n' "$CLEAN_KEY"
            if [ -n "${RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
              printf 'TAURI_SIGNING_PRIVATE_KEY_PASSWORD=%s\n' "$RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            fi
          } >> "$GITHUB_ENV"

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        run: pnpm tauri build --target universal-apple-darwin

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        run: pnpm tauri build

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        run: pnpm tauri build

      - name: Prepare macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p smoke-assets
          SAFE_REF=$(printf '%s' "${GITHUB_REF_NAME}" | tr '/ ' '--')
          VERSION="smoke-${SAFE_REF}-${GITHUB_SHA::7}"
          TAR_GZ=""; APP_PATH=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$TAR_GZ" ] && TAR_GZ=$(find "$path" -maxdepth 1 -name "*.tar.gz" -type f | head -1 || true)
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
            fi
          done
          if [ -n "$TAR_GZ" ]; then
            NEW_TAR_GZ="CC-Switch-${VERSION}-macOS.tar.gz"
            cp "$TAR_GZ" "smoke-assets/$NEW_TAR_GZ"
            [ -f "$TAR_GZ.sig" ] && cp "$TAR_GZ.sig" "smoke-assets/$NEW_TAR_GZ.sig" || true
          fi
          if [ -n "$APP_PATH" ]; then
            APP_DIR=$(dirname "$APP_PATH"); APP_NAME=$(basename "$APP_PATH")
            NEW_ZIP="CC-Switch-${VERSION}-macOS.zip"
            cd "$APP_DIR"
            ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "$NEW_ZIP"
            mv "$NEW_ZIP" "$GITHUB_WORKSPACE/smoke-assets/"
          fi

      - name: Prepare Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path smoke-assets | Out-Null
          $SAFE_REF = $env:GITHUB_REF_NAME -replace '[\\/ ]', '-'
          $VERSION = "smoke-$SAFE_REF-$($env:GITHUB_SHA.Substring(0,7))"
          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $msi) {
            $dest = "CC-Switch-$VERSION-Windows.msi"
            Copy-Item $msi.FullName (Join-Path smoke-assets $dest)
            $sigPath = "$($msi.FullName).sig"
            if (Test-Path $sigPath) {
              Copy-Item $sigPath (Join-Path smoke-assets ("$dest.sig"))
            }
          }
          $exeCandidates = @(
            'src-tauri/target/release/cc-switch.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/cc-switch.exe'
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -ne $exePath) {
            $portableDir = 'smoke-assets/CC-Switch-Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exePath $portableDir
            @('# CC Switch portable build marker', 'portable=true') | Set-Content -Path (Join-Path $portableDir 'portable.ini') -Encoding UTF8
            $portableZip = "smoke-assets/CC-Switch-$VERSION-Windows-Portable.zip"
            Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force
            Remove-Item -Recurse -Force $portableDir
          }

      - name: Prepare Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p smoke-assets
          SAFE_REF=$(printf '%s' "${GITHUB_REF_NAME}" | tr '/ ' '--')
          VERSION="smoke-${SAFE_REF}-${GITHUB_SHA::7}"
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            NEW_APPIMAGE="CC-Switch-${VERSION}-Linux.AppImage"
            cp "$APPIMAGE" "smoke-assets/$NEW_APPIMAGE"
            [ -f "$APPIMAGE.sig" ] && cp "$APPIMAGE.sig" "smoke-assets/$NEW_APPIMAGE.sig" || true
          fi
          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1 || true)
          if [ -n "$DEB" ]; then
            NEW_DEB="CC-Switch-${VERSION}-Linux.deb"
            cp "$DEB" "smoke-assets/$NEW_DEB"
          fi

      - name: Upload desktop smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}-${{ github.sha }}
          path: smoke-assets/*
          if-no-files-found: error
          retention-days: 14

  web-server-build:
    name: Web Server Build (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: cc-switch-server-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: cc-switch-server-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.12.3

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm build:web

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install build deps (native only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config

      - name: Build server binary
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cd src-tauri
            cargo build --release --no-default-features --features web-server --example server --target ${{ matrix.target }}
          else
            cross build --release --no-default-features --features web-server --example server --target ${{ matrix.target }} --manifest-path src-tauri/Cargo.toml
          fi

      - name: Prepare server artifact
        run: |
          mkdir -p smoke-assets
          cp src-tauri/target/${{ matrix.target }}/release/examples/server smoke-assets/${{ matrix.artifact }}
          chmod +x smoke-assets/${{ matrix.artifact }}

      - name: Upload web-server smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-server-${{ matrix.target }}-${{ github.sha }}
          path: smoke-assets/*
          if-no-files-found: error
          retention-days: 14
